<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container d-flex flex-column gap-3 mt-5">

      <h1 >Welcome : <span id="userNameSpan">username</span>
        <button 
        data-bs-toggle="modal"
        data-bs-target="#passwordModal"
        class="btn btn-primary col-2"
      >
        log In
      </button></h1>

      <h1>
        Balance : <span id="balanceSpan">******</span>

        <i class="fa-solid fa-eye ms-3 " style="cursor: pointer" onclick=""></i>
      </h1>
      <div id="action"></div>
        <table class="table table-bordered table-dark text-center">
          <thead>
          </thead>
          <tbody>
          </tbody>
        </table>
    </div>
    

    <!-- Modal -->
    <div
      class="modal fade"
      id="passwordModal"
      tabindex="-1"
      aria-labelledby="passwordModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="passwordModalLabel">log In</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <input
              type="text"
              class="form-control p-2 m-2"
              placeholder="Enter Your UserName"
              id="inputUserName"
            />
            <input
              type="password"
              class="form-control p-2 m-2"
              placeholder="Enter Your Password"
              id="inputPassword"
            />
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
              onclick="logIn()"
            >
              log In
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
